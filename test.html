<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello Frontend Master</h1>
    <div id="app">
        <p v-if ="message.length % 2 === 0"> even: {{message}}</p>
        <p v-else> odd: {{message}}</p>
        <ul>
            <li v-for="number in listOfNumber">{{number}}</li>
        </ul>

    </div>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
        const { createApp } = Vue // using createApp from Vue

        // create a variable called app
        const app = createApp({
            // we pass the object the data 
            data() 
            {
                return {
                    message: 'Hello worlds',
                    listOfNumber: [1,2,3,4,5]
                }
            }
        })

        app.mount('#app') // it mounted on id='app'
    </script>
</body>
</html>


// vue directive is use in element tag to set condition using v-if, v-else
