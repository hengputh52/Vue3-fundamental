<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie</title>
  </head>

  <body>
    <h1>Event Handling</h1>
    <div id="movie">
      <h1>Counter</h1>
      <p>{{count}}</p>
      <button v-on:click="incrementCounter">Increment Count</button>
      <div>
        <p>{{incrementAmount}}</p>
        <label>Increment by:</label>
        <input type="number" 
        v-model="incrementAmount"
        />
      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
      const { createApp } = Vue;

      let count = 0;
      const app = createApp({
        data() {
          return {
            count: 0,
            incrementAmount: 10,
            
          }
        },
        methods: {
            incrementCounter()
            {
              this.count += this.incrementAmount
            }
          }
      })

      app.mount("#movie");
    </script>
  </body>
</html>
